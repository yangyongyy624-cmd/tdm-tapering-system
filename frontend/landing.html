<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>TDM 减药决策矩阵</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,"SF Pro SC","PingFang SC",sans-serif;background:#f8fafc;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:20px;color:#1e293b}
.container{width:100%;max-width:400px}
.header{text-align:center;margin-bottom:32px;padding:0 8px}
.logo{font-size:32px;font-weight:700;color:#1e293b;margin-bottom:8px;letter-spacing:2px}
.subtitle{font-size:15px;color:#64748b;line-height:1.5}
.cards-wrapper{display:flex;flex-direction:column;gap:16px}
.card{display:block;text-decoration:none;background:#fff;border-radius:16px;padding:24px;box-shadow:0 2px 8px rgba(0,0,0,.06);border:2px solid transparent;transition:all .2s;-webkit-tap-highlight-color:transparent;cursor:pointer}
.card:active{transform:scale(.98)}
.card.doctor{border-color:#dbeafe}
.card.doctor:active{border-color:#2563eb;background:#eff6ff}
.card.admin{border-color:#f3e8ff}
.card.admin:active{border-color:#7c3aed;background:#faf5ff}
.card-header{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.card-icon{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:24px}
.card.doctor .card-icon{background:linear-gradient(135deg,#3b82f6,#2563eb)}
.card.admin .card-icon{background:linear-gradient(135deg,#8b5cf6,#7c3aed)}
.card-title{font-size:18px;font-weight:600;color:#0f172a}
.card-desc{font-size:14px;color:#64748b;line-height:1.6}
.footer{text-align:center;font-size:12px;color:#94a3b8;margin-top:32px}
@media(min-width:640px){.cards-wrapper{flex-direction:row}.card{flex:1}}
</style>
</head>
<body>
<div class="container">
<div class="header">
<div class="logo">TDM</div>
<div class="subtitle">减药决策矩阵<br>药物特异性撤药评估系统</div>
</div>
<div class="cards-wrapper">
<a href="/doctor-entry.html" class="card doctor">
<div class="card-header"><div class="card-icon">‍⚕️</div><div class="card-title">医生入口</div></div>
<div class="card-desc">创建患者评估、查看量表卡片、答卷详情穿透</div>
</a>
<a href="/admin-entry.html" class="card admin">
<div class="card-header"><div class="card-icon">🔐</div><div class="card-title">管理员入口</div></div>
<div class="card-desc">管理医生 PIN、查看所有患者、删除报告、改密码</div>
</a>
</div>
<div class="footer">基于 C-SSRS 架构开发</div>
</div>
</body>
</html>
